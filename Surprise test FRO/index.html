<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="container py-4">
        <h2 class="text-center mb-4">Smart To-Do Manager</h2>
        <div class="row g-2 mb-3">
            <div class="col-md-4">
                <input type="text" id="taskInput" class="form-control" placeholder="Enter a new task">
            </div>
            <div class="col-md-2">
                <select id="prioritySelect" class="form-control">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
            </div>
            <div class="col-md-3">
                <input type="date" id="deadlineInput" class="form-control">
            </div>
            <div class="col-md-3">
                <button class="btn btn-primary w-100" onClick="addtask()">Add Task</button>
            </div>
        </div>

        <div class="mb-3">
            <button class="btn btn-outline-primary me-2" onclick="setFilter('all')">All</button>
            <button class="btn btn-outline-warning me-2" onclick="setFilter('pending')">Pending</button>
            <button class="btn btn-outline-success" onclick="setFilter('completed')">Completed</button>
        </div>

        <div class="mb-3">
            <select class="form-select" onchange="setSort(this.value)">
                <option value="">Sort by...</option>
                <option value="deadline">Sort by Deadline (Nearest First)</option>
                <option value="priority">Sort by Priority (Highest First)</option>
            </select>
        </div>

        <div class="mb-3">
            <span>Total: <strong id="totalCount">0</strong></span> |
            <span>Pending: <strong id="pendingCount">0</strong></span> |
            <span>Completed: <strong id="completedCount">0</strong></span>
        </div>

        <div id="taskList" class="row g-3"></div>
    </div>
<script src="script.js"></script>
</body>
</html>
